<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="45%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>

    <!-- Accent gradient for the N letter -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>

    <!-- Stroke gradient for border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#764ba2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Corner accent gradient -->
    <linearGradient id="cornerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow behind the letter -->
    <radialGradient id="glowCenter" cx="50%" cy="48%" r="35%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#764ba2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#667eea" stroke-width="0.4" stroke-opacity="0.08"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" x="8" y="8" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#667eea" fill-opacity="0.1"/>
    </pattern>

    <!-- Text glow filter -->
    <filter id="letterGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.4  0 0 0 0 0.49  0 0 0 0 0.92  0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner shadow -->
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!-- Base shape                              -->
  <!-- ═══════════════════════════════════════ -->
  <g clip-path="url(#roundClip)">
    <!-- Fill background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle patterns -->
    <rect width="512" height="512" fill="url(#grid)"/>
    <rect width="512" height="512" fill="url(#dots)"/>

    <!-- Corner glow - top left -->
    <circle cx="0" cy="0" r="200" fill="url(#cornerGrad)"/>
    <!-- Bottom right ambient -->
    <circle cx="512" cy="512" r="250" fill="#764ba2" fill-opacity="0.06"/>

    <!-- Center glow behind letter -->
    <rect width="512" height="512" fill="url(#glowCenter)"/>

    <!-- ═══════════════════════════════════════ -->
    <!-- Network node decoration (subtle)       -->
    <!-- ═══════════════════════════════════════ -->
    <g opacity="0.12" stroke="#667eea" stroke-width="1">
      <!-- Top-right cluster -->
      <circle cx="390" cy="75" r="3" fill="#667eea"/>
      <circle cx="430" cy="100" r="2" fill="#667eea"/>
      <circle cx="410" cy="50" r="2" fill="#667eea"/>
      <circle cx="455" cy="75" r="1.5" fill="#667eea"/>
      <line x1="390" y1="75" x2="430" y2="100"/>
      <line x1="390" y1="75" x2="410" y2="50"/>
      <line x1="430" y1="100" x2="455" y2="75"/>
      <line x1="410" y1="50" x2="455" y2="75"/>

      <!-- Bottom-left cluster -->
      <circle cx="80" cy="420" r="3" fill="#764ba2"/>
      <circle cx="55" cy="445" r="2" fill="#764ba2"/>
      <circle cx="110" cy="450" r="2" fill="#764ba2"/>
      <circle cx="70" cy="460" r="1.5" fill="#764ba2"/>
      <line x1="80" y1="420" x2="55" y2="445" stroke="#764ba2"/>
      <line x1="80" y1="420" x2="110" y2="450" stroke="#764ba2"/>
      <line x1="55" y1="445" x2="70" y2="460" stroke="#764ba2"/>
      <line x1="110" y1="450" x2="70" y2="460" stroke="#764ba2"/>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- Packet frame hint (bottom-right)       -->
    <!-- ═══════════════════════════════════════ -->
    <g opacity="0.06" transform="translate(330, 430)">
      <rect x="0" y="0" width="80" height="20" rx="3" stroke="#667eea" stroke-width="0.8" fill="none"/>
      <rect x="0" y="0" width="20" height="20" rx="3" fill="#667eea" fill-opacity="0.2"/>
    </g>

    <!-- Binary decoration -->
    <g opacity="0.04" fill="#667eea" font-family="monospace" font-size="9">
      <text x="40" y="490">01001110</text>
      <text x="350" y="30">10110010</text>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- The "N" letter                         -->
    <!-- ═══════════════════════════════════════ -->
    <g filter="url(#letterGlow)">
      <!--
        Custom geometric "N" built from paths for a sharp, modern look.
        Proportions: centered in the 512x512 canvas.
        Left vertical stroke: x=130 to x=178 (48px wide)
        Right vertical stroke: x=334 to x=382 (48px wide)
        Diagonal connecting stroke: 48px wide
      -->
      <path
        d="
          M 130 380
          L 130 132
          L 178 132
          L 178 282
          L 334 132
          L 382 132
          L 382 380
          L 334 380
          L 334 230
          L 178 380
          Z
        "
        fill="url(#letterGrad)"
      />
    </g>

    <!-- Subtle highlight on top edge of N -->
    <path
      d="M 130 132 L 178 132 L 178 140 L 130 140 Z"
      fill="white"
      fill-opacity="0.12"
    />
    <path
      d="M 334 132 L 382 132 L 382 140 L 334 140 Z"
      fill="white"
      fill-opacity="0.08"
    />
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- Border glow                             -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="url(#borderGrad)" stroke-width="2.5"/>
</svg>
