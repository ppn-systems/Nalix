<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#667eea" flood-opacity="0.6"/>
    </filter>
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#667eea" flood-opacity="0.3"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#667eea" stroke-width="0.3" stroke-opacity="0.15"/>
    </pattern>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#667eea" fill-opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="320" r="300" fill="url(#glow)" opacity="0.4"/>
  <circle cx="1130" cy="150" r="350" fill="url(#glow)" opacity="0.3"/>
  <circle cx="640" cy="640" r="400" fill="url(#glow)" opacity="0.2"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <!-- Network node decorations - left -->
  <g transform="scale(1.5)" opacity="0.25" stroke="#667eea" stroke-width="1" fill="none">
    <circle cx="80" cy="60" r="4" fill="#667eea"/>
    <circle cx="140" cy="90" r="3" fill="#667eea"/>
    <circle cx="60" cy="130" r="3" fill="#667eea"/>
    <circle cx="160" cy="50" r="2.5" fill="#667eea"/>
    <circle cx="120" cy="160" r="2.5" fill="#667eea"/>
    <line x1="80" y1="60" x2="140" y2="90"/>
    <line x1="80" y1="60" x2="60" y2="130"/>
    <line x1="140" y1="90" x2="160" y2="50"/>
    <line x1="140" y1="90" x2="120" y2="160"/>
    <line x1="60" y1="130" x2="120" y2="160"/>
  </g>

  <!-- Network node decorations - right -->
  <g transform="translate(480, 240) scale(1.5)" opacity="0.2" stroke="#764ba2" stroke-width="1" fill="none">
    <circle cx="350" cy="100" r="4" fill="#764ba2"/>
    <circle cx="400" cy="60" r="3" fill="#764ba2"/>
    <circle cx="440" cy="130" r="3" fill="#764ba2"/>
    <circle cx="320" cy="140" r="2.5" fill="#764ba2"/>
    <circle cx="380" cy="160" r="2" fill="#764ba2"/>
    <line x1="350" y1="100" x2="400" y2="60"/>
    <line x1="350" y1="100" x2="440" y2="130"/>
    <line x1="350" y1="100" x2="320" y2="140"/>
    <line x1="440" y1="130" x2="380" y2="160"/>
    <line x1="320" y1="140" x2="380" y2="160"/>
  </g>

  <!-- Binary/data stream decoration -->
  <g opacity="0.1" fill="#667eea" font-family="monospace" font-size="14">
    <text x="50" y="520">01001110 01100001 01101100</text>
    <text x="50" y="545">01101001 01111000 00100000</text>
    <text x="1000" y="80">10110010 01001110 11010100</text>
    <text x="1000" y="105">01100001 01101100 01101001</text>
  </g>

  <!-- Packet frame decoration -->
  <g opacity="0.15" transform="translate(50, 560) scale(1.2)">
    <rect x="0" y="0" width="120" height="30" rx="4" stroke="#667eea" stroke-width="1" fill="none"/>
    <rect x="0" y="0" width="30" height="30" rx="4" fill="#667eea" fill-opacity="0.15"/>
    <text x="8" y="19" font-family="monospace" font-size="8" fill="#667eea">HDR</text>
    <text x="38" y="19" font-family="monospace" font-size="8" fill="#667eea">PAYLOAD →</text>
  </g>

  <!-- Main title -->
  <text x="640" y="260" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="144" fill="white" filter="url(#textShadow)" letter-spacing="12">
    NALIX
  </text>

  <!-- Tagline -->
  <text x="640" y="340" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="32" fill="#a8b2d1" letter-spacing="8">
    HIGH-PERFORMANCE NETWORKING FOR .NET
  </text>

  <!-- Feature pills -->
  <g transform="translate(640, 440)" text-anchor="middle">
    <!-- Pill 1 -->
    <g transform="translate(-320, 0)">
      <rect x="-70" y="-18" width="140" height="36" rx="18" fill="#667eea" fill-opacity="0.15" stroke="#667eea" stroke-width="1.2" stroke-opacity="0.4"/>
      <text y="7" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892b0" font-weight="500">⚡ Zero-Alloc</text>
    </g>
    <!-- Pill 2 -->
    <g transform="translate(-160, 0)">
      <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#667eea" fill-opacity="0.15" stroke="#667eea" stroke-width="1.2" stroke-opacity="0.4"/>
      <text y="7" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892b0" font-weight="500">🔐 AEAD</text>
    </g>
    <!-- Pill 3 -->
    <g transform="translate(0, 0)">
      <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#764ba2" fill-opacity="0.15" stroke="#764ba2" stroke-width="1.2" stroke-opacity="0.4"/>
      <text y="7" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892b0" font-weight="500">🔌 Pluggable</text>
    </g>
    <!-- Pill 4 -->
    <g transform="translate(160, 0)">
      <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#764ba2" fill-opacity="0.15" stroke="#764ba2" stroke-width="1.2" stroke-opacity="0.4"/>
      <text y="7" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892b0" font-weight="500">📡 Real-Time</text>
    </g>
    <!-- Pill 5 -->
    <g transform="translate(320, 0)">
      <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#764ba2" fill-opacity="0.15" stroke="#764ba2" stroke-width="1.2" stroke-opacity="0.4"/>
      <text y="7" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8892b0" font-weight="500">🧩 Modular</text>
    </g>
  </g>

  <!-- Version badge -->
  <g transform="translate(640, 540)">
    <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#667eea" fill-opacity="0.2" stroke="#667eea" stroke-width="1" stroke-opacity="0.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#ccd6f6" font-weight="600">.NET 10 · C# 14</text>
  </g>

  <!-- Accent line bottom -->
  <rect x="0" y="634" width="1280" height="6" fill="url(#accent)"/>
</svg>
