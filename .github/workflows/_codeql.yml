name: "CodeQL Analysis"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '44 13 * * 2' # Every Tuesday at 13:44 UTC

jobs:
  check-label:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      is_document: ${{ steps.label_check.outputs.is_document }}
    steps:
      - name: Check if PR has 'document' label
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.setOutput('hasDocsLabel', 'false');
              return;
            }

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const hasDocsLabel = labels.some(label => label.name === 'documentation');
            core.setOutput('hasDocsLabel', hasDocsLabel ? 'true' : 'false');
      - name: Debug output
        run: echo "is_document=${{ steps.label_check.outputs.is_document }}"

  analyze:
    name: Analyze C#
    needs: check-label
    if: github.event_name != 'pull_request' || needs.check-label.outputs.is_document != 'true'
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      - name: Create signing key file
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > ./Nalix.snk

      # Build application code for CodeQL extraction.
      - name: Restore src/
        run: dotnet restore src/Nalix.sln

      - name: Build src/ with CodeQL extraction
        run: |
          dotnet build src/Nalix.sln \
            --configuration Debug \
            --no-restore \
            /p:UseSharedCompilation=false

      # Build tests as well so CodeQL can see the full compilation graph.
      - name: Restore tests/
        run: dotnet restore tests/Nalix.Tests.sln

      - name: Build tests/ with CodeQL extraction
        run: |
          dotnet build tests/Nalix.Tests.sln \
            --configuration Debug \
            --no-restore \
            /p:UseSharedCompilation=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
