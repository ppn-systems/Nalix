name: "Security: CodeQL Analysis"

on:
  push:
    branches: ["master"]
    paths:
      - "src/**"
      - "tests/**"
      - "*.sln"
  pull_request:
    branches: ["master"]
    paths:
      - "src/**"
      - "tests/**"
      - "*.sln"
  schedule:
    - cron: "44 13 * * 2" # Every Tuesday at 13:44 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Gate: skip analysis when the PR is documentation-only
  # ---------------------------------------------------------------------------
  check-label:
    name: "Check: Documentation label"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      is_document: ${{ steps.label_check.outputs.is_document }}
    steps:
      - name: Detect 'documentation' label on PR
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const isDoc = labels.some(l => l.name === 'documentation');
            core.info(`is_document = ${isDoc}`);
            core.setOutput('is_document', isDoc ? 'true' : 'false');

  # ---------------------------------------------------------------------------
  # CodeQL: manual build mode for C#
  # ---------------------------------------------------------------------------
  analyze:
    name: "Analyze: C# (CodeQL)"
    needs: check-label
    # always() prevents skip when check-label is skipped (non-PR events)
    if: |
      always() &&
      (needs.check-label.outputs.is_document != 'true')
       
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      - name: Decode signing key
        shell: bash
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > "$GITHUB_WORKSPACE/src/Nalix.snk"
          else
            echo "SIGNING_KEY is not set. Skipping signing key creation."
          fi

      - name: Restore & build source
        run: |
          dotnet restore src/Nalix.sln
          dotnet build src/Nalix.sln \
            --configuration Release \
            --no-restore \
            /p:UseSharedCompilation=false

      - name: Restore & build tests
        run: |
          dotnet restore tests/Nalix.Tests.sln
          dotnet build tests/Nalix.Tests.sln \
            --configuration Release \
            --no-restore \
            /p:UseSharedCompilation=false

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
