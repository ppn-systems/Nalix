name: "Benchmark: Framework"

on:
  push:
    branches: ["master"]
    paths:
      - "benchmarks/**"
      - "src/**"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: "BenchmarkDotNet"
    runs-on: ubuntu-latest

    concurrency:
      group: benchmark-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-benchmark-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-benchmark-nuget-

      - name: Restore benchmark solution
        run: dotnet restore benchmarks/Nalix.Benchmark.sln

      - name: Build benchmark solution
        run: dotnet build benchmarks/Nalix.Benchmark.sln --configuration Release --no-restore -p:UseSharedCompilation=false

      - name: Run BenchmarkDotNet suite
        run: dotnet run --project benchmarks/Nalix.Benchmark.Framework/Nalix.Benchmark.Framework.csproj --configuration Release -- --exporters json csv

      - name: Download previous benchmark artifact
        id: previous_results
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: benchmark.yml
          branch: master
          name: benchmark-results
          path: artifacts/previous-benchmark-results
          if_no_artifact_found: ignore

      - name: Compare with previous benchmark run
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import pathlib
          import re

          current_dir = pathlib.Path("benchmarks/Nalix.Benchmark.Framework/BenchmarkDotNet.Artifacts/results")
          previous_dir = pathlib.Path("artifacts/previous-benchmark-results")
          summary = pathlib.Path("artifacts/benchmark-comparison.md")
          summary.parent.mkdir(parents=True, exist_ok=True)

          def collect(dir_path: pathlib.Path):
              rows = {}
              if not dir_path.exists():
                  return rows
              for csv_path in dir_path.glob("*-report.csv"):
                  with csv_path.open(newline="", encoding="utf-8") as handle:
                      reader = csv.DictReader(handle)
                      for row in reader:
                          key = f"{csv_path.stem}:{row.get('Method','')}:{row.get('Job','')}"
                          rows[key] = row
              return rows

          def parse_mean(raw: str):
              if not raw:
                  return None, None
              match = re.search(r"([0-9]+(?:\\.[0-9]+)?)\\s*([A-Za-z/]+)?", raw)
              if not match:
                  return None, None
              return float(match.group(1)), match.group(2) or ""

          current = collect(current_dir)
          previous = collect(previous_dir)

          if not previous:
              summary.write_text(
                  "## Benchmark Comparison\\n\\n"
                  "- No previous benchmark artifact was found on `master`, so this run is treated as the baseline.\\n",
                  encoding="utf-8",
              )
              print(summary.read_text(encoding="utf-8"))
              raise SystemExit(0)

          regressions = []
          improvements = []

          for key, current_row in current.items():
              previous_row = previous.get(key)
              if previous_row is None:
                  continue

              current_mean, current_unit = parse_mean(current_row.get("Mean", ""))
              previous_mean, previous_unit = parse_mean(previous_row.get("Mean", ""))
              if current_mean is None or previous_mean is None or previous_mean == 0 or current_unit != previous_unit:
                  continue

              delta_pct = ((current_mean - previous_mean) / previous_mean) * 100.0
              label = key.split(":", 1)[0].replace("-report", "")

              if delta_pct >= 10.0:
                  regressions.append((delta_pct, label, current_row.get("Method", ""), previous_row.get("Mean", ""), current_row.get("Mean", "")))
              elif delta_pct <= -10.0:
                  improvements.append((delta_pct, label, current_row.get("Method", ""), previous_row.get("Mean", ""), current_row.get("Mean", "")))

          lines = ["## Benchmark Comparison", ""]
          if regressions:
              lines.append("### Regressions (>= 10%)")
              for delta_pct, label, method, previous_mean, current_mean in sorted(regressions, reverse=True):
                  lines.append(f"- {label} / {method}: {previous_mean} -> {current_mean} ({delta_pct:.2f}%)")
              lines.append("")
          if improvements:
              lines.append("### Improvements (>= 10%)")
              for delta_pct, label, method, previous_mean, current_mean in sorted(improvements):
                  lines.append(f"- {label} / {method}: {previous_mean} -> {current_mean} ({delta_pct:.2f}%)")
              lines.append("")
          if not regressions and not improvements:
              lines.append("- No >=10% mean-time changes were detected against the previous benchmark artifact.")

          summary.write_text("\\n".join(lines) + "\\n", encoding="utf-8")
          print(summary.read_text(encoding="utf-8"))
          PY

      - name: Append benchmark summary
        if: always()
        shell: bash
        run: cat artifacts/benchmark-comparison.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/Nalix.Benchmark.Framework/BenchmarkDotNet.Artifacts/results
            artifacts/benchmark-comparison.md
          if-no-files-found: warn
