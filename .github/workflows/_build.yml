name: "Template: Build & Test"

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  push:
    branches: ["master"]
    paths:
      - "src/**"
      - "tests/**"
      - "*.sln"
  pull_request:
    branches: ["master"]
    paths:
      - "src/**"
      - "tests/**"
      - "*.sln"
  workflow_call:
    inputs:
      os:
        description: "Target OS (ubuntu-latest | windows-latest)"
        required: true
        type: string
      project:
        description: "Path(s) to .csproj files, one per line"
        required: true
        type: string
      test:
        description: "Path(s) to test .csproj or .sln files, one per line"
        required: true
        type: string
      deploy:
        description: "Set true to publish and upload build output"
        required: false
        type: boolean
        default: false

jobs:
  # ---------------------------------------------------------------------------
  # Gate: skip build when the PR is documentation-only
  # ---------------------------------------------------------------------------
  check-label:
    name: "Check: Documentation label"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      is_document: ${{ steps.label_check.outputs.is_document }}
    steps:
      - name: Detect 'documentation' label on PR
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const isDoc = labels.some(l => l.name === 'documentation');
            core.setOutput('is_document', isDoc ? 'true' : 'false');

  # ---------------------------------------------------------------------------
  # Main: restore → build → test → (optional) publish
  # ---------------------------------------------------------------------------
  build:
    name: "Build & Test (${{ inputs.os }})"
    needs: check-label
    # always() prevents skip when check-label is skipped (non-PR events)
    if: |
      always() &&
      (needs.check-label.outputs.is_document != 'true')
    runs-on: ${{ inputs.os }}

    concurrency:
      group: build-${{ inputs.os }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Set environment variables
        shell: bash
        run: |
          echo "TEST_RESULTS_DIR=artifacts/test-results/${{ runner.os }}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          # Fallback to *.csproj when packages.lock.json is absent
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Decode signing key
        shell: bash
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > ./Nalix.snk

      - name: Restore source projects
        shell: bash
        run: |
          echo "${{ inputs.project }}" | tr -d '\r' | while IFS= read -r proj; do
            [ -n "$proj" ] && { echo "Restoring $proj"; dotnet restore "$proj"; }
          done

      - name: Restore test projects
        shell: bash
        run: |
          echo "${{ inputs.test }}" | tr -d '\r' | while IFS= read -r proj; do
            [ -n "$proj" ] && { echo "Restoring $proj"; dotnet restore "$proj"; }
          done

      - name: Build source projects
        shell: bash
        run: |
          echo "${{ inputs.project }}" | tr -d '\r' | while IFS= read -r proj; do
            [ -n "$proj" ] && { echo "Building $proj"; dotnet build "$proj" --configuration Release --no-restore; }
          done

      - name: Create test results directory
        shell: bash
        run: mkdir -p "$TEST_RESULTS_DIR"

      - name: Run tests
        shell: bash
        run: |
          echo "${{ inputs.test }}" | tr -d '\r' | while IFS= read -r proj; do
            if [ -n "$proj" ]; then
              name=$(basename "${proj%.*}")
              echo "Testing $proj"
              dotnet test "$proj" \
                --configuration Release \
                --no-restore \
                --logger "trx;LogFileName=${name}-${{ runner.os }}.trx" \
                --results-directory "$TEST_RESULTS_DIR" \
                --verbosity normal
            fi
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ runner.os }}
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: warn

      - name: Comment test results on PR
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ env.TEST_RESULTS_DIR }}/**/*.trx
          comment_mode: always
          fail_on: test failures

      - name: Publish build output
        if: inputs.deploy
        shell: bash
        run: |
          echo "${{ inputs.project }}" | tr -d '\r' | while IFS= read -r proj; do
            if [ -n "$proj" ]; then
              name=$(basename "$proj" .csproj)
              echo "Publishing $proj → ./publish/$name"
              dotnet publish "$proj" \
                --configuration Release \
                --no-restore \
                --no-build \
                --output "./publish/$name"
            fi
          done

      - name: Upload publish artifact
        if: inputs.deploy
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ runner.os }}
          path: ./publish