name: _Template Build

on:
  workflow_call:
    inputs:
      os:
        description: 'Target OS to run build (ubuntu-latest, windows-latest)'
        required: true
        type: string
      project:
        description: 'The path(s) to the .csproj file(s), one per line'
        required: true
        type: string
      deploy:
        description: 'Set to true to publish the build output'
        required: true
        type: boolean
        default: false
      test:
        description: 'The path(s) to test .csproj or .sln file(s), one per line'
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Prepare variables
        shell: bash
        run: |
          echo "TEST_RESULTS_DIR=${{ github.workspace }}/artifacts/test-results/${{ runner.os }}" >> "$GITHUB_ENV"

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget

      - name: Restore dependencies
        run: |
          echo "${{ inputs.project }}" | tr -d '\r' | while IFS= read -r proj; do
            if [ -n "$proj" ]; then
              echo "🔧 Restoring $proj"
              dotnet restore "$proj"
            fi
          done
        shell: bash

      - name: Restore test dependencies
        run: |
          echo "${{ inputs.test }}" | tr -d '\r' | while IFS= read -r testproj; do
            if [ -n "$testproj" ]; then
              echo "🧪 Restoring $testproj"
              dotnet restore "$testproj"
            fi
          done
        shell: bash

      - name: Build all projects
        run: |
          echo "${{ inputs.project }}" | tr -d '\r' | while IFS= read -r proj; do
            if [ -n "$proj" ]; then
              echo "📦 Building $proj"
              dotnet build "$proj" --configuration Debug --no-restore
            fi
          done
        shell: bash

      - name: Create test results directory
        shell: bash
        run: mkdir -p "$TEST_RESULTS_DIR"

      - name: Run tests
        run: |
          echo "${{ inputs.test }}" | tr -d '\r' | while IFS= read -r testproj; do
            if [ -n "$testproj" ]; then
              name=$(basename "$testproj")
              name="${name%.*}"
              echo "🧪 Testing $testproj"
              dotnet test "$testproj" \
                --configuration Debug \
                --no-restore \
                --logger "trx;LogFileName=${name}-${{ runner.os }}.trx" \
                --results-directory "$TEST_RESULTS_DIR"
            fi
          done
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ runner.os }}
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: warn

      - name: Publish build output
        if: ${{ inputs.deploy }}
        run: |
          echo "${{ inputs.project }}" | tr -d '\r' | while IFS= read -r proj; do
            if [ -n "$proj" ]; then
              name=$(basename "$proj" .csproj)
              echo "🚀 Publishing $proj to ./publish/$name"
              dotnet publish "$proj" --configuration Debug --no-restore --no-build --output "./publish/$name"
            fi
          done
        shell: bash

      - name: Upload publish artifact
        if: ${{ inputs.deploy }}
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ runner.os }}
          path: ./publish
