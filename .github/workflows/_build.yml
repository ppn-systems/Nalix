name: "Template: Build & Test"

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      os:
        description: "Target OS (ubuntu-latest | windows-latest)"
        required: true
        type: string
      project:
        description: "Path(s) to .csproj or .sln files, one per line"
        required: true
        type: string
      test:
        description: "Path(s) to test .csproj or .sln files, one per line"
        required: true
        type: string
      deploy:
        description: "Set true to publish and upload build output"
        required: false
        type: boolean
        default: false

jobs:
  check-label:
    name: "Check: Documentation label"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      is_document: ${{ steps.label_check.outputs.is_document }}
    steps:
      - name: Detect 'documentation' label on PR
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const isDoc = labels.some(l => l.name === 'documentation');
            core.setOutput('is_document', isDoc ? 'true' : 'false');

  build:
    name: "Build & Test (${{ inputs.os }})"
    needs: check-label
    if: |
      always() &&
      (needs.check-label.outputs.is_document != 'true')
    runs-on: ${{ inputs.os }}

    concurrency:
      group: build-${{ inputs.os }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Set environment variables
        shell: bash
        run: echo "TEST_RESULTS_DIR=artifacts/test-results/${{ runner.os }}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Decode signing key
        shell: bash
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > "$GITHUB_WORKSPACE/src/Nalix.snk"
          else
            echo "SIGNING_KEY is not set. Skipping signing key creation."
          fi

      - name: Restore all projects
        shell: bash
        run: |
          dotnet restore "${{ inputs.project }}"
          dotnet restore "${{ inputs.test }}"

      - name: Build all projects
        shell: bash
        run: dotnet build "${{ inputs.project }}" --configuration Release --no-restore -p:UseSharedCompilation=false

      - name: Run all tests
        shell: bash
        run: dotnet test "${{ inputs.test }}" --configuration Release --no-restore --logger "trx;LogFileName=tests_results.trx" --results-directory "$TEST_RESULTS_DIR" -p:UseSharedCompilation=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ runner.os }}
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: warn

      - name: Publish build output
        if: inputs.deploy
        shell: bash
        run: dotnet publish "${{ inputs.project }}" --configuration Release --no-restore --no-build --output ./publish

      - name: Upload publish artifact
        if: inputs.deploy
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ runner.os }}
          path: ./publish
