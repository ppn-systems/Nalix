name: "Template: Build & Test"

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      os:
        description: "Target OS (ubuntu-latest | windows-latest)"
        required: true
        type: string
      project:
        description: "Path(s) to .csproj or .sln files, one per line"
        required: true
        type: string
      test:
        description: "Path(s) to test .csproj or .sln files, one per line"
        required: true
        type: string
      deploy:
        description: "Set true to publish and upload build output"
        required: false
        type: boolean
        default: false
      trim_project:
        description: "Executable project used for trim/self-contained publish smoke tests"
        required: false
        type: string
        default: example/Nalix.Network.Examples/Nalix.Network.Examples.csproj

jobs:
  check-label:
    name: "Check: Documentation label"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      is_document: ${{ steps.label_check.outputs.is_document }}
    steps:
      - name: Detect 'documentation' label on PR
        id: label_check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const isDoc = labels.some(l => l.name === 'documentation');
            core.setOutput('is_document', isDoc ? 'true' : 'false');

  build:
    name: "Build & Test (${{ inputs.os }})"
    needs: check-label
    if: |
      always() &&
      (needs.check-label.outputs.is_document != 'true')
    runs-on: ${{ inputs.os }}

    concurrency:
      group: build-${{ inputs.os }}-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Set environment variables
        shell: bash
        run: |
          echo "TEST_RESULTS_DIR=artifacts/test-results/${{ runner.os }}" >> "$GITHUB_ENV"
          echo "COVERAGE_REPORT_DIR=artifacts/coverage/${{ runner.os }}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Decode signing key
        shell: bash
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > "$GITHUB_WORKSPACE/src/Nalix.snk"
          else
            echo "SIGNING_KEY is not set. Skipping signing key creation."
          fi

      - name: Restore all projects
        shell: bash
        run: |
          dotnet restore "${{ inputs.project }}"
          dotnet restore "${{ inputs.test }}"

      - name: Restore trim smoke project
        if: inputs.os == 'ubuntu-latest'
        shell: bash
        run: dotnet restore "${{ inputs.trim_project }}"

      - name: Build all projects
        shell: bash
        run: |
          dotnet build "${{ inputs.project }}" --configuration Release --no-restore -p:UseSharedCompilation=false
          dotnet build "${{ inputs.test }}" --configuration Release --no-restore -p:UseSharedCompilation=false

      - name: Run all tests
        shell: bash
        run: dotnet test "${{ inputs.test }}" --configuration Release --no-build --no-restore --logger "trx" --results-directory "$TEST_RESULTS_DIR" --collect:"XPlat Code Coverage" -p:UseSharedCompilation=false

      - name: Detect coverage reports
        id: coverage_files
        if: always()
        shell: bash
        run: |
          if find "$TEST_RESULTS_DIR" -name 'coverage.cobertura.xml' -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate coverage report
        if: always() && steps.coverage_files.outputs.found == 'true'
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ env.TEST_RESULTS_DIR }}/**/coverage.cobertura.xml
          targetdir: ${{ env.COVERAGE_REPORT_DIR }}
          reporttypes: Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary
        if: always() && steps.coverage_files.outputs.found == 'true'
        shell: bash
        run: cat "${COVERAGE_REPORT_DIR}/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ runner.os }}
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: warn

      - name: Upload coverage report
        if: always() && steps.coverage_files.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ runner.os }}
          path: ${{ env.COVERAGE_REPORT_DIR }}
          if-no-files-found: warn

      - name: Publish trimmed self-contained smoke test
        if: inputs.os == 'ubuntu-latest'
        shell: bash
        run: dotnet publish "${{ inputs.trim_project }}" --configuration Release --no-restore -r linux-x64 --self-contained true /p:PublishTrimmed=true -p:UseSharedCompilation=false --output ./publish-trimmed

      - name: Publish build output
        if: inputs.deploy
        shell: bash
        run: dotnet publish "${{ inputs.project }}" --configuration Release --no-restore --no-build --output ./publish

      - name: Upload publish artifact
        if: inputs.deploy
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ runner.os }}
          path: ./publish
