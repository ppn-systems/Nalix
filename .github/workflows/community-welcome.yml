name: "Community: Welcome contributors"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    name: "Greet first-time contributor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hi **@${{ github.actor }}**, thanks for opening your first issue!
            - Please read our [Contributing Guidelines](https://github.com/ppn-systems/Nalix/blob/master/CONTRIBUTING.md).
            - Check out our [Code of Conduct](https://github.com/ppn-systems/Nalix/blob/master/CODE_OF_CONDUCT.md).
            - Need help? See the [project documentation](https://github.com/ppn-systems/Nalix#readme) or join Discussions.

            We appreciate your contribution!
          pr-message: |
            👋 Hi **@${{ github.actor }}**, thank you for submitting your first pull request!
            - Please ensure your PR follows our [Contributing Guidelines](https://github.com/ppn-systems/Nalix/blob/master/CONTRIBUTING.md).
            - CI checks will run automatically — watch for any failures.
            - If your PR addresses an issue, please mention it in the description (e.g. `Closes #123`).

            Our maintainers will review your contribution as soon as possible. Thanks for helping!
