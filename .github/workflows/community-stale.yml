name: "Community: Stale issue & PR cleanup"

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "Mark and close stale items"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 60 days and is now marked as stale.
            If it is still relevant, please leave a comment to keep it open.
            It will be closed automatically in 14 days if there is no activity.
          close-issue-message: >
            Closing this issue due to inactivity.
            Feel free to re-open if it becomes relevant again.

          # Pull requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been inactive for 30 days and is now marked as stale.
            Please update the PR or leave a comment if you are still working on it.
            It will be closed in 7 days if there is no activity.
          close-pr-message: >
            Closing this pull request due to inactivity.
            Feel free to re-open when you are ready to continue.

          # Never mark items with these labels as stale
          exempt-issue-labels: "security,bug,blocked,help wanted"
          exempt-pr-labels: "security,blocked,in progress"