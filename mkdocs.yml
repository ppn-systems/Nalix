site_name: Nalix
site_description: Enterprise-grade real-time TCP networking framework for .NET
site_url: https://ppn-systems.github.io/nalix-docs/
copyright: Copyright © 2025-2026 PPN Corporation
repo_url: https://github.com/ppn-systems/nalix
repo_name: nalix
edit_uri: https://github.com/ppn-systems/nalix/edit/master/docs/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ppn-systems/nalix
    - icon: fontawesome/brands/facebook
      link: https://facebook.com/ppn.system
    - icon: fontawesome/solid/envelope
      link: mailto:ppn.system@gmail.com
  announcement: |
    🚀 Nalix is under active development. Star us on GitHub!
  canonical_url: https://ppn-systems.github.io/nalix-docs/
  meta:
    - name: keywords
      content: real-time server, .NET, networking, TCP, UDP
    - property: og:type
      content: website
    - property: og:title
      content: Nalix Documentation
    - property: og:description
      content: High-performance real-time server framework for .NET
  analytics:
    provider: google
    property: G-1MR49ERG6K

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: assets/nalix.png
  favicon: assets/nalix.ico
  # font:
  #   text: Inter
  #   code: "JetBrains Mono"
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.instant
    # - navigation.instant.prefetch
    - navigation.tabs.sticky
    # - navigation.sections
    - header.sticky
    - search.highlight
    - search.suggest 
    - content.action.edit
    - content.action.view
    - content.tabs
    - content.code.copy
    - content.code.annotate
    - content.tooltips

plugins:
  - search:
      separator: '[\s\-\.]+'
  # - social
  - git-revision-date-localized:
      type: datetime
      enable_creation_date: true
      fallback_to_build_date: true
  - mermaid2

markdown_extensions:
  - md_in_html
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.highlight:
      guess_lang: false
      use_pygments: true
      anchor_linenums: true
      pygments_lang_class: true
      line_spans: __span
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

